services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - rstudio
      - code-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy_data:/data
      - ./volumes/caddy_config:/config
    environment:
      - SERVER_URL=${SERVER_URL}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - ecomod

  rstudio:
    image: ecomod/rstudio:latest
    restart: unless-stopped
    expose:
      - "8787"
    volumes:
      - ./volumes/workspace:/home/rstudio
    environment:
      - USER=rstudio
      - PASSWORD=${USER_PASSWORD}
      - TZ=${TZ}
    networks:
      - ecomod

  code-server:
    image: ecomod/code-server:latest
    restart: unless-stopped
    expose:
      - "8443"
    volumes:
      - ./volumes/code_config:/config
      - ./volumes/workspace:/home/abc
    environment:
      - PASSWORD=${USER_PASSWORD}
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      - ecomod

networks:
  ecomod:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "${DOCKER_MTU:-1450}"
